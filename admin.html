<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px
}

</style>
</head>

<body>

<h2>ADMIN DASHBOARD</h2>

<div class="card">

Total transaksi hari ini

<h1 id="total"></h1>

</div>

<div class="card">

<h3>TOP ONLINE</h3>

<div id="online"></div>

</div>

<div class="card">

<h3>TOP OFFLINE</h3>

<div id="offline"></div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbwltfctNlXXkMQmATIAOsSX1Hb7k-pgo1U2RQ_WdbtFUaFfatKAAjq4ud6GESM6uom8/exec"

fetch(API+"?action=admin")

.then(r=>r.json())

.then(d=>{

document.getElementById("total").innerHTML=d.total_today

d.top_online.forEach(x=>{
document.getElementById("online").innerHTML+=
x.nama+" : "+x.total+"<br>"
})

d.top_offline.forEach(x=>{
document.getElementById("offline").innerHTML+=
x.nama+" : "+x.total+"<br>"
})

})

</script>

</body>
</html>
