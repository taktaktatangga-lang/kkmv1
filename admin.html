<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px
}

</style>

</head>

<body>

<div class="card">

<h3>Statistik Hari Ini</h3>

Total Transaksi
<b id="trx"></b>

<br>

Online
<b id="online"></b>

<br>

Offline
<b id="offline"></b>

<br>

Top Up
<b id="topup"></b>

</div>

<script>

var API="https://script.google.com/macros/s/AKfycbxVQWElE8xkIzHleAsT1s4ecXPDQ6gGpn39mzoKFkdsrBhjs7AnEJYAYZMGu4vsuKWy/exec"

function load(){

fetch(API+"?action=admin")

.then(r=>r.json())

.then(d=>{

document.getElementById("trx").innerHTML=d.transaksi
document.getElementById("online").innerHTML=d.online
document.getElementById("offline").innerHTML=d.offline
document.getElementById("topup").innerHTML=d.topup

})

}

load()

setInterval(load,5000)

</script>

</body>
</html>
