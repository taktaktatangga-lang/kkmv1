<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin</title>

<style>

body{font-family:Arial;background:#f2f2f2;padding:10px}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px
}

</style>

</head>

<body>

<div class="card">

<h3>Statistik Hari Ini</h3>

Transaksi : <b id="trx">0</b><br>
Online : <b id="online">0</b><br>
Offline : <b id="offline">0</b><br>
Top Up : <b id="topup">0</b><br>
Rider Aktif : <b id="aktif">0</b>

</div>

<div class="card">

<h3>Saldo Minus</h3>

<table id="minus"></table>

</div>

<script>

var API="https://script.google.com/macros/s/AKfycbynnQSj5fF0EcE1Dhgt6ZruWSe0DW7JYo7pTVhOOx77lxofutsMfd44nHaKZZmxM-pJ/exec"

function load(){

fetch(API+"?action=admin")

.then(r=>r.json())

.then(d=>{

document.getElementById("trx").innerHTML=d.transaksi
document.getElementById("online").innerHTML=d.online
document.getElementById("offline").innerHTML=d.offline
document.getElementById("topup").innerHTML=d.topup
document.getElementById("aktif").innerHTML=d.rideraktif

var t=document.getElementById("minus")

t.innerHTML=""

d.minus.forEach(function(r){

var row=t.insertRow()

row.insertCell(0).innerHTML=r.nama
row.insertCell(1).innerHTML=r.saldo

})

})

}

load()

setInterval(load,3000)

</script>

</body>
</html>
