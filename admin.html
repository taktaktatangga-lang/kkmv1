<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:10px
}

.stat{
font-size:22px;
font-weight:bold
}

</style>

</head>

<body>

<div class="card">

<h2>Dashboard Admin</h2>

</div>



<div class="card">

Total Transaksi Hari Ini

<div class="stat" id="trx">0</div>

</div>



<div class="card">

Order Online

<div class="stat" id="online">0</div>

</div>



<div class="card">

Order Offline

<div class="stat" id="offline">0</div>

</div>



<div class="card">

Top Up Saldo

<div class="stat" id="topup">0</div>

</div>



<script>

var API="https://script.google.com/macros/s/AKfycbyt8kms9gDv4mI9-_GmHjVfcbWwPTcw86K7f2_oqvy5unDzRlWMbhpQh1XNF9NOLG4V/exec"



function load(){

fetch(API+"?action=admin")

.then(r=>r.json())

.then(d=>{

document.getElementById("trx").innerHTML=d.transaksi||0

document.getElementById("online").innerHTML=d.online||0

document.getElementById("offline").innerHTML=d.offline||0

document.getElementById("topup").innerHTML=d.topup||0

})

}



load()

setInterval(load,5000)

</script>

</body>
</html>
