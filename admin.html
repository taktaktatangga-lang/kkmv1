<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px
}

.card{
background:#222;
padding:20px;
border-radius:10px;
margin-bottom:20px
}

</style>
</head>

<body>

<h2>ADMIN DASHBOARD</h2>

<div class="card">

Total transaksi hari ini :
<h1 id="total"></h1>

</div>

<div class="card">

<h3>TOP ONLINE</h3>

<div id="online"></div>

</div>

<div class="card">

<h3>TOP OFFLINE</h3>

<div id="offline"></div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbw8j_0okewUOZmrH2LKxQ58FaiclT2PvWtR0UjSGEEWfiY69iHZslCU15gRb-2alQa5/exec"

fetch(API+"?action=admin")
.then(r=>r.json())
.then(d=>{

document.getElementById("total").innerHTML=d.total_today

d.top_online.forEach(r=>{

document.getElementById("online").innerHTML+=
r.nama+" : "+r.total+"<br>"

})

d.top_offline.forEach(r=>{

document.getElementById("offline").innerHTML+=
r.nama+" : "+r.total+"<br>"

})

})

</script>

</body>
</html>
