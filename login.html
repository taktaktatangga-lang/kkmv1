<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Rider</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.card{background:white;padding:20px;border-radius:10px}
button{width:100%;padding:12px;background:#6B0F1A;color:white;border:none}
</style>

</head>

<body>

<div class="card">

<h3>Login Rider</h3>

<input id="id" placeholder="Masukkan ID Rider">

<button onclick="login()">LOGIN</button>

</div>

<script>

var API="https://script.google.com/macros/s/AKfycbw6xZMLgUiZbq8K75kLmnoZ1tfl9cWYK68YJhI_x-m9cxYn37hKyhIHMq_nyTvwQlub/exec"

function login(){

var id=document.getElementById("id").value

fetch(API+"?action=login&id="+id)

.then(r=>r.json())

.then(d=>{

if(d.status=="ok"){

localStorage.setItem("rider",d.id)
localStorage.setItem("nama",d.nama)

location.href="dashboard.html"

}else{

alert("ID tidak ditemukan")

}

})

}

</script>

</body>
</html>
