<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Rider</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding-top:100px
}

input{
padding:15px;
font-size:20px;
width:200px;
text-align:center
}

button{
padding:15px 40px;
font-size:18px;
margin-top:20px;
background:#00b894;
color:white;
border:none;
border-radius:8px
}
</style>
</head>

<body>

<h2>LOGIN RIDER</h2>

<input id="id" placeholder="USER ID">

<br>

<button onclick="login()">LOGIN</button>

<script>

const API="https://script.google.com/macros/s/AKfycbw8j_0okewUOZmrH2LKxQ58FaiclT2PvWtR0UjSGEEWfiY69iHZslCU15gRb-2alQa5/exec"

function login(){

var id=document.getElementById("id").value

fetch(API+"?action=login&id="+id)
.then(r=>r.json())
.then(d=>{

if(d.status){

localStorage.nama=d.nama
localStorage.saldo=d.saldo

location="dashboard.html"

}else{

alert("ID tidak ditemukan")

}

})

}

</script>

</body>
</html>
