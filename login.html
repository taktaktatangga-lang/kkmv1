<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Login Rider</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh
}

.card{
background:#1e293b;
padding:30px;
border-radius:10px;
width:260px;
text-align:center
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
text-align:center
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
color:white
}

</style>
</head>

<body>

<div class="card">

<h2>LOGIN RIDER</h2>

<input id="id" placeholder="USER ID">

<button onclick="login()">LOGIN</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx1LYxb3aPHPr_FWPYM3YFkO-dyus5i1qxJm-epzcSaHfDo4ls8I_wisiZgTSHjS8j2/exec"

function login(){

var id=document.getElementById("id").value

fetch(API+"?action=login&id="+id)

.then(r=>r.json())

.then(d=>{

if(d.status){

localStorage.nama=d.nama
localStorage.saldo=d.saldo

location="dashboard.html"

}else{

alert("ID tidak ditemukan")

}

})

}

</script>

</body>
</html>
