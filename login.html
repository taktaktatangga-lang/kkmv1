<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Rider</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh
}

.card{
background:#1e293b;
padding:30px;
border-radius:10px;
width:260px;
text-align:center
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
text-align:center
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
color:white
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:10px 16px;
border-radius:6px;
display:none
}

.error{
background:#ef4444 !important
}

</style>
</head>

<body>

<div class="card">

<h2>LOGIN RIDER</h2>

<input id="id" placeholder="USER ID">

<button onclick="login()">LOGIN</button>

</div>

<div id="toast"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbyBryxdHwbfJNB1x67UYEh_3kYH1mZXDf4w0OgG4aZQ-8ia-E6vb51baMHimFezH2lR/exec"

function toast(msg,err=false){

var t=document.getElementById("toast")

t.innerText=msg

t.className=err?"error":""

t.style.display="block"

setTimeout(()=>{t.style.display="none"},3000)

}

function login(){

var id=document.getElementById("id").value

fetch(API+"?action=login&id="+id)

.then(r=>r.json())

.then(d=>{

if(d.status){

toast("Login berhasil")

localStorage.nama=d.nama
localStorage.saldo=d.saldo

setTimeout(()=>{
location="dashboard.html"
},800)

}else{

toast("ID tidak ditemukan",true)

}

})

.catch(()=>toast("Server error",true))

}

</script>

</body>
</html>
