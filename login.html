<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Rider</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px
}

.card{
background:white;
padding:20px;
border-radius:10px
}

button{
width:100%;
padding:12px;
background:#6B0F1A;
color:white;
border:none
}

input{
width:100%;
padding:10px;
margin-bottom:10px
}

</style>

</head>

<body>

<div class="card">

<h3>Login Rider</h3>

<input id="id" placeholder="ID Rider">

<button onclick="login()">LOGIN</button>

</div>

<script>

var API="https://script.google.com/macros/s/AKfycbxVQWElE8xkIzHleAsT1s4ecXPDQ6gGpn39mzoKFkdsrBhjs7AnEJYAYZMGu4vsuKWy/exec"

function login(){

var id=document.getElementById("id").value

fetch(API+"?action=login&id="+id)

.then(r=>r.json())

.then(d=>{

if(d.status=="ok"){

localStorage.setItem("rider",d.id)
localStorage.setItem("nama",d.nama)

location.href="dashboard.html"

}else{

alert("ID tidak ditemukan")

}

})

}

</script>

</body>
</html>
