<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Rider</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:15px
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
font-size:16px
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white
}

.stat{
display:flex;
justify-content:space-between;
font-size:14px
}

</style>
</head>

<body>

<h3 id="nama"></h3>

<h2 id="saldo"></h2>

<div class="card stat">

<div>
online hari ini : <b id="online"></b><br>
offline hari ini : <b id="offline"></b>
</div>

<div style="text-align:right">
Rank online : <b id="rank_online"></b><br>
Rank offline : <b id="rank_offline"></b>
</div>

</div>


<div class="card">

<h3>INPUT ORDER</h3>

<label>ORDER</label>
<input id="nilai">

<label>TIPE ORDER</label>
<select id="tipe">
<option value="online">online</option>
<option value="offline">offline</option>
</select>

<label>KETERANGAN</label>
<input id="ket">

</div>


<div class="card">

<h3>TOP UP</h3>

<label>NOMINAL</label>
<input id="topup">

<label>TF KE BCA/DANA/OVO/GOPAY/CASH DI</label>
<input id="ket_topup">

</div>


<button onclick="simpan()">SIMPAN REKAPAN</button>


<script>

const API="https://script.google.com/macros/s/AKfycbwltfctNlXXkMQmATIAOsSX1Hb7k-pgo1U2RQ_WdbtFUaFfatKAAjq4ud6GESM6uom8/exec"

var nama=localStorage.nama
var saldo=Number(localStorage.saldo)||0

document.getElementById("nama").innerHTML=nama

document.getElementById("saldo").innerHTML=
"Saldo : Rp "+saldo.toLocaleString("id-ID")

loadDashboard()

function loadDashboard(){

fetch(API+"?action=dashboard&nama="+nama)

.then(r=>r.json())

.then(d=>{

document.getElementById("online").innerHTML=d.online_today
document.getElementById("offline").innerHTML=d.offline_today

document.getElementById("rank_online").innerHTML="#"+d.rank_online
document.getElementById("rank_offline").innerHTML="#"+d.rank_offline

})

}



function simpan(){

var nilai=Number(document.getElementById("nilai").value)||0

if(nilai>0 && nilai<8000){

alert("minimal order 8000")

return

}

var data={

action:"simpan_rekapan",

nama:nama,

orders:[{

nilai:nilai,
tipe:document.getElementById("tipe").value,
ket:document.getElementById("ket").value

}],

topup:Number(document.getElementById("topup").value)||0,

ket_topup:document.getElementById("ket_topup").value

}

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

.then(r=>r.json())

.then(d=>{

localStorage.saldo=d.saldo

document.getElementById("saldo").innerHTML=
"Saldo : Rp "+Number(d.saldo).toLocaleString("id-ID")

loadDashboard()

})

}

</script>

</body>
</html>
