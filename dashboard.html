<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard Rider</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:15px
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px
}

table{
width:100%
}

th:nth-child(1){width:30%}
th:nth-child(2){width:35%}
th:nth-child(3){width:35%}

input,select{
width:100%;
padding:8px;
font-size:14px
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white
}

.stat{
display:flex;
justify-content:space-between
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:10px 16px;
border-radius:6px;
display:none
}

.error{
background:#ef4444 !important
}

</style>
</head>

<body>

<h3 id="nama"></h3>

<h2 id="saldo"></h2>

<div class="card stat">

<div>
online hari ini : <b id="online"></b><br>
offline hari ini : <b id="offline"></b>
</div>

<div style="text-align:right">
Rank online : <b id="rank_online"></b><br>
Rank offline : <b id="rank_offline"></b>
</div>

</div>

<div class="card">

<h3>INPUT ORDER</h3>

<table id="orderTable">

<tr>
<th>ORDER</th>
<th>TIPE ORDER</th>
<th>KETERANGAN</th>
</tr>

<tr>

<td>
<input class="order" oninput="autoTambahBaris()">
</td>

<td>
<select class="tipe">
<option value="online">online</option>
<option value="offline">offline</option>
</select>
</td>

<td>
<input class="ket">
</td>

</tr>

</table>

</div>

<div class="card">

<h3>TOP UP</h3>

<input id="topup" placeholder="NOMINAL">

<input id="ket_topup" placeholder="TF KE BCA/DANA/OVO/GOPAY/CASH DI">

</div>

<button onclick="simpan()">SIMPAN REKAPAN</button>

<div id="toast"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbx1LYxb3aPHPr_FWPYM3YFkO-dyus5i1qxJm-epzcSaHfDo4ls8I_wisiZgTSHjS8j2/exec"

var nama=localStorage.nama||"-"
var saldo=Number(localStorage.saldo)||0

document.getElementById("nama").innerHTML=nama

document.getElementById("saldo").innerHTML=
"Rp "+saldo.toLocaleString("id-ID")

function toast(msg,err=false){

var t=document.getElementById("toast")

t.innerText=msg

t.className=err?"error":""

t.style.display="block"

setTimeout(()=>{t.style.display="none"},3000)

}

loadDashboard()

function loadDashboard(){

fetch(API+"?action=dashboard&nama="+nama)

.then(r=>r.json())

.then(d=>{

document.getElementById("online").innerHTML=d.online_today
document.getElementById("offline").innerHTML=d.offline_today

document.getElementById("rank_online").innerHTML="#"+d.rank_online
document.getElementById("rank_offline").innerHTML="#"+d.rank_offline

})

}

function autoTambahBaris(){

var table=document.getElementById("orderTable")

var rows=table.querySelectorAll("tr")

var lastRow=rows[rows.length-1]

var input=lastRow.querySelector(".order")

if(input.value!=""){

var row=table.insertRow()

row.innerHTML=`

<td>
<input class="order" oninput="autoTambahBaris()">
</td>

<td>
<select class="tipe">
<option value="online">online</option>
<option value="offline">offline</option>
</select>
</td>

<td>
<input class="ket">
</td>

`

}

}

function simpan(){

var orders=[]

var nilai=document.querySelectorAll(".order")
var tipe=document.querySelectorAll(".tipe")
var ket=document.querySelectorAll(".ket")

for(var i=0;i<nilai.length;i++){

var n=Number(nilai[i].value)||0

if(n>=8000){

orders.push({
nilai:n,
tipe:tipe[i].value,
ket:ket[i].value
})

}

}

var data={

action:"simpan_rekapan",
nama:nama,
orders:orders,
topup:Number(document.getElementById("topup").value)||0,
ket_topup:document.getElementById("ket_topup").value

}

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

.then(r=>r.json())

.then(d=>{

if(d.status){

localStorage.saldo=d.saldo

toast("Rekapan berhasil disimpan")

setTimeout(()=>{
location.reload()
},1200)

}else{

toast("Gagal menyimpan",true)

}

})

.catch(()=>toast("Server error",true))

}

window.onload=function(){

var first=document.querySelector(".order")

if(first) first.focus()

}

</script>

</body>
</html>
