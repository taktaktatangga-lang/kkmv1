<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Rider</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:15px; margin:0;}
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }
button { padding:12px; width:100%; background:#6B0F1A; color:white; border:none; cursor:pointer; margin-top:5px;}
table { width:100%; border-collapse: collapse; }
td, th { padding:8px; border:1px solid #ccc; }
td.keterangan{ width:30%; } td.nilai, td.jenis{ width:35%; }
</style>
</head>
<body>

<div class="card">
<h3 id="nama"></h3>
Saldo
<h2 id="saldo">0</h2>
</div>

<div class="card">
<h4>Transaksi</h4>
<table id="tabel">
<tr><th>Nilai</th><th>Jenis</th><th>Keterangan</th></tr>
<tr>
<td class="nilai"><input type="number" oninput="autoTambah(this)"></td>
<td class="jenis"><select><option value="online">online</option><option value="offline">offline</option></select></td>
<td class="keterangan"><input placeholder="Keterangan"></td>
</tr>
</table>
</div>

<div class="card">
<h4>Top Up Saldo Deposit</h4>
Nilai TOP UP:<br><input type="number" id="topupNilai" placeholder="Masukkan nominal Top Up"><br><br>
Keterangan:<br><input type="text" id="topupKet" placeholder="Keterangan"><br>
</div>

<div class="card">
<button onclick="kirim()">SIMPAN REKAPAN</button>
</div>

<script>
var API="https://script.google.com/macros/s/AKfycbw_IxZ0HdQgdTXlcZ8JphMSKcEc-WUXJkLjNSX9pnr_g0LoZ41z6AycK2ZHVknbyvDf/exec"; // ganti URL Web App
var rider=localStorage.getItem("rider");
if(!rider){ location.href="login.html"; }

document.getElementById("nama").innerText="Rider "+localStorage.getItem("nama");

function loadDashboard(){
  fetch(API+"?action=dashboard&id="+rider)
  .then(res=>res.json())
  .then(d=>{
    document.getElementById("saldo").innerText="Rp "+Number(d.saldo).toLocaleString("id-ID");
  });
}

function autoTambah(input){
  var row=input.parentNode.parentNode;
  var tabel=document.getElementById("tabel");
  if(row.rowIndex==tabel.rows.length-1 && input.value!==""){
    var r=tabel.insertRow();
    r.innerHTML=`<td class="nilai"><input type="number" oninput="autoTambah(this)"></td>
<td class="jenis"><select><option value="online">online</option><option value="offline">offline</option></select></td>
<td class="keterangan"><input placeholder="Keterangan"></td>`;
  }
}

function kirim(){
  var tabel=document.getElementById("tabel");
  var data=[];
  for(var i=1;i<tabel.rows.length;i++){
    var nilai=tabel.rows[i].cells[0].children[0].value;
    var jenis=tabel.rows[i].cells[1].children[0].value;
    var ket=tabel.rows[i].cells[2].children[0].value;
    if(nilai!==""){ data.push({nilai:Number(nilai), jenis:jenis, ket:ket}); }
  }
  var topup=Number(document.getElementById("topupNilai").value);
  var ketTopup=document.getElementById("topupKet").value.trim();
  if(topup>0 && ketTopup!==""){ data.push({nilai:topup, jenis:"topup", ket:ketTopup}); }
  if(data.length===0){ alert("Tidak ada transaksi atau Top Up"); return; }

  fetch(API,{method:"POST", body:JSON.stringify({action:"transaksi_batch", id:rider, data:data})})
  .then(res=>res.json())
  .then(r=>{
    alert("Rekapan tersimpan!");
    loadDashboard();
    tabel.innerHTML=`<tr><th>Nilai</th><th>Jenis</th><th>Keterangan</th></tr>
<tr><td class="nilai"><input type="number" oninput="autoTambah(this)"></td>
<td class="jenis"><select><option value="online">online</option><option value="offline">offline</option></select></td>
<td class="keterangan"><input placeholder="Keterangan"></td></tr>`;
    document.getElementById("topupNilai").value="";
    document.getElementById("topupKet").value="";
  }).catch(e=>alert("Gagal simpan rekapan"));
}

loadDashboard();
setInterval(loadDashboard,5000);
</script>

</body>
</html>
