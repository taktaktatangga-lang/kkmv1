<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Rider</title>

<style>

body{font-family:Arial;background:#f2f2f2;margin:0;padding:10px}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px
}

button{
width:100%;
padding:12px;
background:#6B0F1A;
color:white;
border:none
}

table{
width:100%;
border-collapse:collapse
}

input,select{
width:100%;
padding:6px
}

</style>

</head>

<body>

<div class="card">
<h3 id="nama"></h3>
Saldo
<h2 id="saldo">0</h2>
</div>

<div class="card">

Online Hari Ini
<b id="online">0</b>

<br>

Offline Hari Ini
<b id="offline">0</b>

</div>

<div class="card">

<h3>Input Order</h3>

<table id="tabel">

<tr>
<th>ORDER</th>
<th>TIPE ORDER</th>
<th>KETERANGAN</th>
</tr>

<tr>

<td>
<input type="number" oninput="autoTambah(this)">
</td>

<td>
<select>
<option value="online">online</option>
<option value="offline">offline</option>
</select>
</td>

<td>
<input>
</td>

</tr>

</table>

<button onclick="simpan()">SIMPAN REKAPAN</button>

</div>

<div class="card">

<h3>Top Up</h3>

<input id="nominal" placeholder="Nominal">

<input id="ket" placeholder="TF KE BCA/DANA/OVO/GOPAY/CASH DI">

</div>

<script>

var API="https://script.google.com/macros/s/AKfycbynnQSj5fF0EcE1Dhgt6ZruWSe0DW7JYo7pTVhOOx77lxofutsMfd44nHaKZZmxM-pJ/exec"

var rider=localStorage.getItem("rider")

document.getElementById("nama").innerHTML=localStorage.getItem("nama")

function load(){

fetch(API+"?action=dashboard&id="+rider)

.then(r=>r.json())

.then(d=>{

document.getElementById("saldo").innerHTML="Rp "+Number(d.saldo).toLocaleString("id-ID")

document.getElementById("online").innerHTML=d.online_today

document.getElementById("offline").innerHTML=d.offline_today

})

}

function autoTambah(input){

var row=input.parentNode.parentNode
var tabel=document.getElementById("tabel")

if(row.rowIndex==tabel.rows.length-1 && input.value!=""){

var r=tabel.insertRow()

r.innerHTML=`
<td><input type="number" oninput="autoTambah(this)"></td>
<td>
<select>
<option value="online">online</option>
<option value="offline">offline</option>
</select>
</td>
<td><input></td>
`

}

}

function simpan(){

var tabel=document.getElementById("tabel")

var data=[]

for(var i=1;i<tabel.rows.length;i++){

var nilai=tabel.rows[i].cells[0].children[0].value
var jenis=tabel.rows[i].cells[1].children[0].value
var ket=tabel.rows[i].cells[2].children[0].value

if(nilai!=""){

data.push({
nilai:Number(nilai),
jenis:jenis,
ket:ket
})

}

}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"transaksi_batch",
id:rider,
data:data
})
})

var nominal=document.getElementById("nominal").value
var ket=document.getElementById("ket").value

if(nominal!=""){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"topup",
id:rider,
nominal:Number(nominal),
ket:ket
})
})

}

alert("Tersimpan")

load()

}

load()

setInterval(load,3000)

</script>

</body>
</html>
