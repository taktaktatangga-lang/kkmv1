<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard Rider</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px
}

table{
width:100%;
border-collapse:collapse
}

input,select{
width:100%;
padding:8px
}

button{
width:100%;
padding:12px;
background:#6B0F1A;
color:white;
border:none
}

</style>

</head>

<body>

<div class="card">

<h3 id="nama"></h3>

Saldo
<h2 id="saldo">0</h2>

</div>



<div class="card">

Online Hari Ini
<b id="online"></b>

<br>

Offline Hari Ini
<b id="offline"></b>

</div>



<div class="card">

<h3>Input Order</h3>

<table id="tabel">

<tr>
<th>ORDER</th>
<th>TIPE ORDER</th>
<th>KETERANGAN</th>
</tr>

<tr>

<td><input type="number"></td>

<td>

<select>

<option value="online">online</option>

<option value="offline">offline</option>

</select>

</td>

<td><input></td>

</tr>

</table>

<button onclick="tambah()">Tambah Baris</button>

</div>



<div class="card">

<h3>Top Up</h3>

<input id="topupNominal" placeholder="Nominal">

<input id="topupKet" placeholder="TF KE BCA/DANA/OVO/GOPAY/CASH DI">

</div>



<button onclick="simpan()">SIMPAN REKAPAN</button>



<script>

var API="https://script.google.com/macros/s/AKfycbwJoRdebIPPAxUpBG_qNEcg4lV-pTdipF04hL7fkFPmnlZlDQj8BJ7noTd0k5RFOmCa/exec"

var rider=localStorage.getItem("rider")

document.getElementById("nama").innerHTML=localStorage.getItem("nama")



function load(){

fetch(API+"?action=dashboard&id="+rider)

.then(r=>r.json())

.then(d=>{

document.getElementById("saldo").innerHTML="Rp "+Number(d.saldo).toLocaleString("id-ID")

document.getElementById("online").innerHTML=d.online_today

document.getElementById("offline").innerHTML=d.offline_today

})

}



function tambah(){

var t=document.getElementById("tabel")

var r=t.insertRow()

r.innerHTML=`

<td><input type="number"></td>

<td>

<select>

<option value="online">online</option>

<option value="offline">offline</option>

</select>

</td>

<td><input></td>

`

}



function simpan(){

var t=document.getElementById("tabel")

var transaksi=[]

for(var i=1;i<t.rows.length;i++){

var nominal=t.rows[i].cells[0].children[0].value

var tipe=t.rows[i].cells[1].children[0].value

var ket=t.rows[i].cells[2].children[0].value

if(nominal!=""){

nominal=Number(nominal)

if(nominal<8000){

alert("Minimal order 8000")

return

}

if(nominal%1000!=0){

alert("Nilai harus ribuan")

return

}

transaksi.push({

nominal:nominal,
tipe:tipe,
keterangan:ket

})

}

}



var topupNominal=document.getElementById("topupNominal").value

var topupKet=document.getElementById("topupKet").value



fetch(API,{

method:"POST",

body:JSON.stringify({

action:"simpan_rekapan",

id:rider,

transaksi:transaksi,

topup:{

nominal:Number(topupNominal)||0,
keterangan:topupKet

}

})

})

.then(r=>r.json())

.then(d=>{

alert("Rekapan tersimpan")

location.reload()

})

}



load()

setInterval(load,3000)

</script>

</body>
</html>
