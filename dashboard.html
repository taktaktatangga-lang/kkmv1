<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Rider</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:15px
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
font-size:16px
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white
}

.stat{
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<h3 id="nama"></h3>
<h2 id="saldo"></h2>

<div class="card stat">
<div>
Online hari ini : <b id="online"></b><br>
Offline hari ini : <b id="offline"></b>
</div>

<div style="text-align:right">
Rank online : <b id="ronline"></b><br>
Rank offline : <b id="roffline"></b>
</div>
</div>


<div class="card">

<h3>INPUT ORDER</h3>

<input id="order1" placeholder="ORDER">

<select id="tipe1">
<option value="online">ONLINE</option>
<option value="offline">OFFLINE</option>
</select>

<input id="ket1" placeholder="KETERANGAN">

</div>


<div class="card">

<h3>TOP UP</h3>

<input id="topup" placeholder="NOMINAL">

<input id="ket_topup" placeholder="TF KE BCA/DANA/OVO/GOPAY/CASH DI">

</div>

<button onclick="simpan()">SIMPAN REKAPAN</button>


<script>

const API="https://script.google.com/macros/s/AKfycbw8j_0okewUOZmrH2LKxQ58FaiclT2PvWtR0UjSGEEWfiY69iHZslCU15gRb-2alQa5/exec"

var nama=localStorage.nama

document.getElementById("nama").innerHTML=nama

loadDashboard()

function loadDashboard(){

fetch(API+"?action=dashboard&nama="+nama)
.then(r=>r.json())
.then(d=>{

document.getElementById("online").innerHTML=d.online_today
document.getElementById("offline").innerHTML=d.offline_today
document.getElementById("ronline").innerHTML=d.rank_online
document.getElementById("roffline").innerHTML=d.rank_offline

})

}


function simpan(){

var order = Number(document.getElementById("order1").value)||0

if(order>0 && order<8000){

alert("Minimal order 8000")

return

}

var data={

action:"simpan_rekapan",
nama:nama,

orders:[
{
nilai:order,
tipe:document.getElementById("tipe1").value,
ket:document.getElementById("ket1").value
}
],

topup:Number(document.getElementById("topup").value)||0,
ket_topup:document.getElementById("ket_topup").value

}

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(d=>{

document.getElementById("saldo").innerHTML="Saldo : Rp "+d.saldo

loadDashboard()

})

}

</script>

</body>
</html>
