<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Rider</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  padding: 15px;
  margin: 0;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
button {
  padding: 12px;
  width: 100%;
  background: #6B0F1A;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 5px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
input, select {
  width: 100%;
  padding: 6px;
  box-sizing: border-box;
}
td.keterangan {
  width: 30%;
}
td.nilai, td.jenis {
  width: 35%;
}
</style>
</head>
<body>

<!-- Card Nama & Saldo -->
<div class="card">
  <h3 id="nama"></h3>
  Saldo
  <h2 id="saldo">0</h2>
</div>

<!-- Card Transaksi Hari Ini -->
<div class="card">
  Transaksi Hari Ini<br>
  Online : <b id="online">0</b><br>
  Offline : <b id="offline">0</b>
</div>

<!-- Card Rank Bulan Ini -->
<div class="card">
  Rank Bulan Ini<br>
  Online : <span id="rankOnline"></span><br>
  Offline : <span id="rankOffline"></span>
</div>

<!-- Card Tabel Transaksi -->
<div class="card">
  <h4>Transaksi</h4>
  <table id="tabel">
    <tr>
      <th>Nilai</th>
      <th>Jenis</th>
      <th>Keterangan</th>
    </tr>
    <tr>
      <td class="nilai"><input type="number" oninput="autoTambah(this)"></td>
      <td class="jenis">
        <select>
          <option value="online">online</option>
          <option value="offline">offline</option>
          <option value="topup">TOP UP</option>
        </select>
      </td>
      <td class="keterangan"><input placeholder="Keterangan"></td>
    </tr>
  </table>
  <button onclick="kirim()">SIMPAN REKAPAN</button>
</div>

<script>
var API="https://script.google.com/macros/s/AKfycbzkbr5s94Qu9Bv5FKMI1VecnMcxiB8gnRcbOnGfbCQD6bG8C8V3iawMyHT_-Ijkkokf/exec"

// Cek login
var rider = localStorage.getItem("rider");
if(!rider){ location.href="login.html"; }

document.getElementById("nama").innerText = "Rider " + localStorage.getItem("nama");

let dashboardData = null;

function loadDashboard(){
  fetch(API+"?action=dashboard&id="+rider)
    .then(res => res.json())
    .then(d => {
      dashboardData = d;
      var saldo = Number(d.saldo) || 0;
      document.getElementById("saldo").innerText = "Rp " + saldo.toLocaleString("id-ID");
      document.getElementById("online").innerText = d.online_today;
      document.getElementById("offline").innerText = d.offline_today;
      document.getElementById("rankOnline").innerText = "#" + d.rank_online;
      document.getElementById("rankOffline").innerText = "#" + d.rank_offline;
    })
    .catch(err => console.log("Gagal load dashboard", err));
}

// Auto tambah baris transaksi
function autoTambah(input){
  var row = input.parentNode.parentNode;
  var tabel = document.getElementById("tabel");
  if(row.rowIndex === tabel.rows.length - 1 && input.value !== ""){
    var r = tabel.insertRow();
    r.innerHTML = `<td class="nilai"><input type="number" oninput="autoTambah(this)"></td>
                   <td class="jenis"><select><option value="online">online</option><option value="offline">offline</option><option value="topup">TOP UP</option></select></td>
                   <td class="keterangan"><input placeholder="Keterangan"></td>`;
  }
}

// Kirim semua transaksi termasuk TOP UP
function kirim(){
  var tabel = document.getElementById("tabel");
  var data = [];
  for(var i=1; i<tabel.rows.length; i++){
    var nilai = tabel.rows[i].cells[0].children[0].value;
    var jenis = tabel.rows[i].cells[1].children[0].value;
    var ket = tabel.rows[i].cells[2].children[0].value;
    if(nilai !== ""){
      data.push({nilai: Number(nilai), jenis: jenis, ket: ket});
    }
  }
  if(data.length === 0){ alert("Tidak ada transaksi"); return; }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({action:"transaksi_batch", id:rider, data:data})
  })
  .then(res => res.json())
  .then(res => {
    alert("Rekapan tersimpan!");
    loadDashboard();
    // Reset tabel
    tabel.innerHTML = `<tr>
      <th>Nilai</th>
      <th>Jenis</th>
      <th>Keterangan</th>
    </tr>
    <tr>
      <td class="nilai"><input type="number" oninput="autoTambah(this)"></td>
      <td class="jenis"><select><option value="online">online</option><option value="offline">offline</option><option value="topup">TOP UP</option></select></td>
      <td class="keterangan"><input placeholder="Keterangan"></td>
    </tr>`;
  })
  .catch(err => { alert("Gagal simpan rekapan"); console.log(err); });
}

// Load awal & interval refresh
loadDashboard();
setInterval(loadDashboard, 5000);
</script>

</body>
</html>
